  <text x="1024" y="513" fill="#FDBA74" font-size="9" text-anchor="end">Layer 4 / 5</text>

  <rect x="40" y="535" width="300" height="93" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.8"/>
  <text x="190" y="558" fill="#9A3412" font-size="11" font-weight="700" text-anchor="middle">JESR-Fidelity 保真渲染</text>
  <text x="190" y="578" fill="#64748B" font-size="8" text-anchor="middle">smart_optimize 一键智能优化 — Global auto-retouch</text>
  <text x="190" y="594" fill="#64748B" font-size="8" text-anchor="middle">targeted_retouch 针对性精修 — Per-region parameters</text>
  <text x="190" y="610" fill="#64748B" font-size="8" text-anchor="middle">Skin · Eye · Nose · Face shape · Lip · Neck · Body ratio</text>
  <text x="190" y="624" fill="#94A3B8" font-size="7.5" text-anchor="middle">Powered by GPEN BFR512 Face Restoration</text>

  <rect x="365" y="535" width="300" height="93" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.8"/>
  <text x="515" y="558" fill="#9A3412" font-size="11" font-weight="700" text-anchor="middle">JESR-Creative 创意渲染</text>
  <text x="515" y="578" fill="#64748B" font-size="8" text-anchor="middle">Diffusion img2img Style Transfer 扩散模型风格迁移</text>
  <text x="515" y="594" fill="#64748B" font-size="8" text-anchor="middle">5 creative presets · Strength ∈ [0, 0.30]</text>
  <text x="515" y="610" fill="#64748B" font-size="8" text-anchor="middle">Conditional denoising pipeline 条件去噪流水线</text>
  <text x="515" y="624" fill="#94A3B8" font-size="7.5" text-anchor="middle">Powered by SSD-1B diffusers</text>

  <!-- Horizontal flow arrows between fidelity → creative → guard (subtle) -->
  <line x1="343" y1="581" x2="362" y2="581" stroke="#FED7AA" stroke-width="2"/>
  <polygon points="362,578 365,581 362,584" fill="#FED7AA"/>
  <line x1="668" y1="581" x2="687" y2="581" stroke="#FED7AA" stroke-width="2"/>
  <polygon points="687,578 690,581 687,584" fill="#FED7AA"/>

  <rect x="695" y="535" width="320" height="93" rx="6" fill="#FFFFFF" stroke="#E11D48" stroke-width="2.2"/>
  <text x="855" y="558" fill="#BE123C" font-size="11" font-weight="700" text-anchor="middle">🛡️ Metric Control Guard 度量控制守卫</text>
  <text x="855" y="578" fill="#64748B" font-size="8" text-anchor="middle">Identity check: ArcFace SIM ≥ θ threshold (default 0.72)</text>
  <text x="855" y="594" fill="#64748B" font-size="8" text-anchor="middle">Strength retry: 4 descending steps (floor 0.08)</text>
  <text x="855" y="610" fill="#64748B" font-size="8" text-anchor="middle">Pass → deliver creative · Fail → fallback to fidelity</text>
  <text x="855" y="624" fill="#94A3B8" font-size="7.5" text-anchor="middle">ArcFace + FaceNet dual evaluator</text>

  <!-- Subtle flow indicator -->
  <polygon points="530,647 538,659 522,659" fill="#CBD5E1"/>

  <!-- ===== LAYER 5: OUTPUT ===== -->
  <rect x="20" y="665" width="1020" height="92" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="665" width="1020" height="26" rx="8" fill="#F1F5F9"/>
  <rect x="20" y="677" width="1020" height="14" rx="0" fill="#F1F5F9"/>
  <text x="36" y="682" fill="#475569" font-size="11" font-weight="700">OUTPUT · 输出 Delivery · Persistence · Logging</text>
  <text x="1024" y="682" fill="#CBD5E1" font-size="9" text-anchor="end">Layer 5 / 5</text>

  <rect x="40" y="704" width="230" height="42" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="155" y="721" fill="#475569" font-size="10" font-weight="700" text-anchor="middle">Rendered Image 渲染结果</text>
  <text x="155" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">/api/assets/job/{job_id}</text>

  <rect x="295" y="704" width="230" height="42" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="410" y="721" fill="#475569" font-size="10" font-weight="700" text-anchor="middle">Session Store 会话存储</text>
  <text x="410" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">In-memory · Recipe history · Audit traces</text>

  <rect x="550" y="704" width="230" height="42" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="665" y="721" fill="#475569" font-size="10" font-weight="700" text-anchor="middle">Model Registry 模型分发</text>
  <text x="665" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">Code in Git · Weights via Release</text>

  <rect x="805" y="704" width="210" height="42" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="910" y="721" fill="#475569" font-size="10" font-weight="700" text-anchor="middle">Metric Logging 度量记录</text>
  <text x="910" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">IPS · SAS · SID · FHS · ODI · CEN</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Arial, Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16A34A"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C3AED"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EA580C"/>
    </marker>
    <marker id="arr-rose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E11D48"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1100" height="820" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="550" y="32" fill="#0F172A" font-size="17" font-weight="700" text-anchor="middle">HelloBeauty — JESR Portrait Retouch Platform</text>
  <text x="550" y="52" fill="#94A3B8" font-size="10" text-anchor="middle">Joint Evaluation Scoring &amp; Rendering · Profile-Driven Closed-Loop Pipeline</text>

  <!-- ===== LAYER 1: ENTRY / PERCEPTION ===== -->
  <rect x="15" y="72" width="1070" height="108" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="72" width="1070" height="22" rx="8" fill="#DBEAFE"/>
  <text x="30" y="87" fill="#1E40AF" font-size="10" font-weight="700">ENTRY · 用户意图捕获 — User Intent Capture</text>

  <!-- Phone Upload -->
  <rect x="45" y="105" width="185" height="58" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="137" y="126" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">📱 Phone Upload</text>
  <text x="137" y="142" fill="#64748B" font-size="7.5" text-anchor="middle">Camera / Album → IngressService</text>
  <text x="137" y="155" fill="#94A3B8" font-size="7" text-anchor="middle">JPEG/PNG temporary upload</text>

  <!-- Seed Gallery -->
  <rect x="275" y="105" width="185" height="58" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="367" y="126" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">🎴 Seed Gallery</text>
  <text x="367" y="142" fill="#64748B" font-size="7.5" text-anchor="middle">Swipe sampling (like/dislike)</text>
  <text x="367" y="155" fill="#94A3B8" font-size="7" text-anchor="middle">→ Profile vector estimation</text>

  <!-- Preference QA -->
  <rect x="505" y="105" width="185" height="58" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="597" y="126" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">📋 Preference QA</text>
  <text x="597" y="142" fill="#64748B" font-size="7.5" text-anchor="middle">Questionnaire-driven profiling</text>
  <text x="597" y="155" fill="#94A3B8" font-size="7" text-anchor="middle">8-dim aesthetic vector</text>

  <!-- Reference Photo -->
  <rect x="735" y="105" width="195" height="58" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="832" y="126" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">🖼️ Reference Photo</text>
  <text x="832" y="142" fill="#64748B" font-size="7.5" text-anchor="middle">Manual style anchor selection</text>
  <text x="832" y="155" fill="#94A3B8" font-size="7" text-anchor="middle">Target-style photo upload</text>

  <!-- ===== LAYER 2: JESR-CORE ===== -->
  <rect x="15" y="205" width="1070" height="130" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="205" width="1070" height="22" rx="8" fill="#EDE9FE"/>
  <text x="30" y="220" fill="#5B21B6" font-size="10" font-weight="700">JESR-CORE · JESR-Aesthetic-Profile Engine — 美学画像引擎</text>

  <!-- Profile Engine -->
  <rect x="45" y="242" width="290" height="78" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <text x="190" y="265" fill="#5B21B6" font-size="11" font-weight="700" text-anchor="middle">JESR-Aesthetic-Profile</text>
  <text x="190" y="283" fill="#64748B" font-size="8" text-anchor="middle">8-dim vector: [light_tendency, warmth, contrast,</text>
  <text x="190" y="298" fill="#64748B" font-size="8" text-anchor="middle">texture_tendency, makeup_intensity, facial_detail,</text>
  <text x="190" y="313" fill="#64748B" font-size="8" text-anchor="middle">style_strength, identity_tolerance]  ∈ [-1, 1]</text>

  <!-- Recipe System -->
  <rect x="390" y="242" width="260" height="78" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="520" y="265" fill="#5B21B6" font-size="10.5" font-weight="700" text-anchor="middle">Recipe System (jesr_core.v1)</text>
  <text x="520" y="283" fill="#64748B" font-size="8" text-anchor="middle">Tone {brightness, warmth, contrast}</text>
  <text x="520" y="298" fill="#64748B" font-size="8" text-anchor="middle">Face {skin_smooth, eye_size, face_slim, ...}</text>
  <text x="520" y="313" fill="#64748B" font-size="8" text-anchor="middle">Creative {preset_id, strength}</text>

  <!-- Style Presets -->
  <rect x="705" y="242" width="210" height="78" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="810" y="265" fill="#5B21B6" font-size="10.5" font-weight="700" text-anchor="middle">5 Creative Style Presets</text>
  <text x="810" y="284" fill="#64748B" font-size="8" text-anchor="middle">fresh_japanese (清新日系)</text>
  <text x="810" y="298" fill="#64748B" font-size="8" text-anchor="middle">retro_hongkong · clear_korean</text>
  <text x="810" y="312" fill="#64748B" font-size="8" text-anchor="middle">lazy_french · american_hotgirl</text>

  <!-- Arrows: Entry → JESR-Core -->
  <polyline points="137,163 137,198 190,198 190,242" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <polyline points="367,163 367,198 520,198 520,242" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <polyline points="597,163 597,242" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <polyline points="832,163 832,198 810,198 810,242" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>

  <!-- ===== LAYER 3: ORCHESTRATOR ===== -->
  <rect x="15" y="360" width="1070" height="110" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="360" width="1070" height="22" rx="8" fill="#DCFCE7"/>
  <text x="30" y="375" fill="#166534" font-size="10" font-weight="700">JESR-ORCHESTRATOR · 编排调度 — Recipe · Feedback · Rollback · Audit</text>

  <!-- Recipe Compilation -->
  <rect x="45" y="397" width="210" height="58" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="150" y="419" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Recipe Compilation</text>
  <text x="150" y="437" fill="#64748B" font-size="8" text-anchor="middle">profile_vector → recipe params</text>
  <text x="150" y="450" fill="#94A3B8" font-size="7.5" text-anchor="middle">8 linear algebraic transforms</text>

  <!-- Feedback Interpreter -->
  <rect x="300" y="397" width="185" height="58" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="392" y="419" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Feedback Interpreter</text>
  <text x="392" y="437" fill="#64748B" font-size="8" text-anchor="middle">3 pain tags: identity · texture · style</text>
  <text x="392" y="450" fill="#94A3B8" font-size="7.5" text-anchor="middle">Free-text keyword → tag mapping</text>

  <!-- Rollback -->
  <rect x="530" y="397" width="165" height="58" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="612" y="419" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Rollback</text>
  <text x="612" y="437" fill="#64748B" font-size="8" text-anchor="middle">Recipe version history</text>
  <text x="612" y="450" fill="#94A3B8" font-size="7.5" text-anchor="middle">Iteration-level undo</text>

  <!-- Audit Trace -->
  <rect x="740" y="397" width="190" height="58" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="835" y="419" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Audit Trace</text>
  <text x="835" y="437" fill="#64748B" font-size="8" text-anchor="middle">Provider chain recording</text>
  <text x="835" y="450" fill="#94A3B8" font-size="7.5" text-anchor="middle">Model info + param snapshot</text>

  <!-- Arrows: JESR-Core → Orchestrator -->
  <polyline points="190,320 190,353 150,353 150,397" fill="none" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arr-violet)"/>
  <polyline points="520,320 520,353 392,353 392,397" fill="none" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arr-violet)"/>
  <polyline points="810,320 810,353 612,353 612,397" fill="none" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arr-violet)"/>

  <!-- ===== LAYER 4: RENDERING ===== -->
  <rect x="15" y="495" width="1070" height="142" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="495" width="1070" height="22" rx="8" fill="#FFEDD5"/>
  <text x="30" y="510" fill="#C2410C" font-size="10" font-weight="700">RENDERING · 渲染管线 — Fidelity + Creative + Metric Control Guard</text>

  <!-- JESR-Fidelity -->
  <rect x="45" y="530" width="250" height="90" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.8"/>
  <text x="170" y="552" fill="#9A3412" font-size="10.5" font-weight="700" text-anchor="middle">JESR-Fidelity</text>
  <text x="170" y="572" fill="#64748B" font-size="8" text-anchor="middle">smart_optimize: global auto-retouch</text>
  <text x="170" y="588" fill="#64748B" font-size="8" text-anchor="middle">targeted_retouch: per-region parameters</text>
  <text x="170" y="604" fill="#64748B" font-size="8" text-anchor="middle">Skin smoothing · eye/nose/face reshaping</text>
  <text x="170" y="617" fill="#94A3B8" font-size="7.5" text-anchor="middle">GPEN BFR512 Face Restoration</text>

  <!-- JESR-Creative -->
  <rect x="345" y="530" width="250" height="90" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.8"/>
  <text x="470" y="552" fill="#9A3412" font-size="10.5" font-weight="700" text-anchor="middle">JESR-Creative</text>
  <text x="470" y="572" fill="#64748B" font-size="8" text-anchor="middle">Diffusion img2img Style Transfer</text>
  <text x="470" y="588" fill="#64748B" font-size="8" text-anchor="middle">5 presets × strength ∈ [0, 0.30]</text>
  <text x="470" y="604" fill="#64748B" font-size="8" text-anchor="middle">Conditional denoising pipeline</text>
  <text x="470" y="617" fill="#94A3B8" font-size="7.5" text-anchor="middle">SSD-1B diffusers</text>

  <!-- Metric Control Guard -->
  <rect x="645" y="530" width="280" height="90" rx="6" fill="#FFFFFF" stroke="#E11D48" stroke-width="2.2"/>
  <text x="785" y="552" fill="#BE123C" font-size="10.5" font-weight="700" text-anchor="middle">🛡️ Metric Control Guard</text>
  <text x="785" y="572" fill="#64748B" font-size="8" text-anchor="middle">Identity check: ArcFace SIM ≥ θ (default 0.72)</text>
  <text x="785" y="588" fill="#64748B" font-size="8" text-anchor="middle">Strength retry: 4 descending steps (floor 0.08)</text>
  <text x="785" y="604" fill="#64748B" font-size="8" text-anchor="middle">Pass → deliver creative · Fail → fallback fidelity</text>
  <text x="785" y="617" fill="#94A3B8" font-size="7.5" text-anchor="middle">ArcFace + FaceNet dual evaluation</text>

  <!-- Arrows: Orchestrator → Rendering -->
  <polyline points="150,455 150,490 170,490 170,530" fill="none" stroke="#16A34A" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <polyline points="392,455 392,490 470,490 470,530" fill="none" stroke="#16A34A" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <polyline points="612,455 612,490 785,490 785,530" fill="none" stroke="#16A34A" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <!-- Internal arrows: Fidelity → Creative → Metric Control -->
  <polyline points="295,575 345,575" fill="none" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="320" y="568" fill="#64748B" font-size="7" text-anchor="middle">fidelity img</text>
  <polyline points="595,575 645,575" fill="none" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="620" y="568" fill="#64748B" font-size="7" text-anchor="middle">creative img</text>

  <!-- Feedback loop: Metric Control → Orchestrator (retry) -->
  <polyline points="785,620 785,652 955,652 955,345 835,345 835,397" fill="none" stroke="#E11D48" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-rose)"/>
  <text x="962" y="500" fill="#E11D48" font-size="8" font-weight="600" transform="rotate(-90, 962, 500)">feedback / retry loop</text>

  <!-- ===== LAYER 5: OUTPUT ===== -->
  <rect x="15" y="662" width="1070" height="90" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="662" width="1070" height="22" rx="8" fill="#F1F5F9"/>
  <text x="30" y="677" fill="#475569" font-size="10" font-weight="700">OUTPUT · 输出 — Delivery · Persistence · Logging</text>

  <rect x="45" y="698" width="195" height="40" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="142" y="715" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Rendered Image</text>
  <text x="142" y="730" fill="#94A3B8" font-size="7.5" text-anchor="middle">/api/assets/job/{job_id}</text>

  <rect x="290" y="698" width="195" height="40" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="387" y="715" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Session Store</text>
  <text x="387" y="730" fill="#94A3B8" font-size="7.5" text-anchor="middle">In-memory · recipe history · traces</text>

  <rect x="535" y="698" width="195" height="40" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="632" y="715" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Model Registry</text>
  <text x="632" y="730" fill="#94A3B8" font-size="7.5" text-anchor="middle">Code in Git · Weights via Release</text>

  <rect x="780" y="698" width="195" height="40" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="877" y="715" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Metric Logging</text>
  <text x="877" y="730" fill="#94A3B8" font-size="7.5" text-anchor="middle">IPS · SAS · SID · FHS · ODI · CEN</text>

  <!-- Arrows to output -->
  <polyline points="170,620 170,655 142,655 142,698" fill="none" stroke="#EA580C" stroke-width="1.2" marker-end="url(#arr-orange)"/>
  <polyline points="785,620 785,655 877,655 877,698" fill="none" stroke="#E11D48" stroke-width="1.2" marker-end="url(#arr-rose)"/>

  <!-- ===== Legend ===== -->
  <rect x="920" y="76" width="165" height="120" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="1002" y="93" fill="#334155" font-size="9.5" font-weight="700" text-anchor="middle">Legend</text>
  <rect x="933" y="103" width="16" height="8" rx="2" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1"/><text x="955" y="111" fill="#475569" font-size="8">Entry / 入口</text>
  <rect x="933" y="117" width="16" height="8" rx="2" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1"/><text x="955" y="125" fill="#475569" font-size="8">JESR-Core / 核心</text>
  <rect x="933" y="131" width="16" height="8" rx="2" fill="#FFFFFF" stroke="#16A34A" stroke-width="1"/><text x="955" y="139" fill="#475569" font-size="8">Orchestrator / 编排</text>
  <rect x="933" y="145" width="16" height="8" rx="2" fill="#FFFFFF" stroke="#EA580C" stroke-width="1"/><text x="955" y="153" fill="#475569" font-size="8">Rendering / 渲染</text>
  <rect x="933" y="159" width="16" height="8" rx="2" fill="#FFFFFF" stroke="#E11D48" stroke-width="1"/><text x="955" y="167" fill="#475569" font-size="8">Metric Guard / 守卫</text>
  <rect x="933" y="173" width="16" height="8" rx="2" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/><text x="955" y="181" fill="#475569" font-size="8">Output / 输出</text>
  <line x1="933" y1="191" x2="949" y2="191" stroke="#E11D48" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="955" y="194" fill="#475569" font-size="8">Feedback/Retry</text>
</svg>

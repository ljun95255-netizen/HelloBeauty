<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 780" font-family="Arial, Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="1060" height="780" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="530" y="34" fill="#0F172A" font-size="18" font-weight="700" text-anchor="middle">HelloBeauty — JESR 人像精修平台</text>
  <text x="530" y="56" fill="#94A3B8" font-size="10.5" text-anchor="middle">Joint Evaluation Scoring &amp; Rendering · Profile-Driven Closed-Loop Pipeline · 画像美学引擎驱动的闭环精修系统</text>

  <!-- ===== LAYER 1: ENTRY ===== -->
  <rect x="20" y="78" width="1020" height="108" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="78" width="1020" height="26" rx="8" fill="#DBEAFE"/>
  <rect x="20" y="90" width="1020" height="14" rx="0" fill="#DBEAFE"/>
  <text x="36" y="95" fill="#1E40AF" font-size="11" font-weight="700">ENTRY · 用户意图捕获 User Intent Capture</text>
  <text x="1024" y="95" fill="#93C5FD" font-size="9" text-anchor="end">Layer 1 / 5</text>

  <rect x="40" y="118" width="225" height="55" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="152" y="142" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">📱 Phone Upload 手机上传</text>
  <text x="152" y="160" fill="#64748B" font-size="8" text-anchor="middle">Camera / Album → IngressService</text>

  <rect x="290" y="118" width="225" height="55" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="402" y="142" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">🎴 Seed Gallery 种子画廊</text>
  <text x="402" y="160" fill="#64748B" font-size="8" text-anchor="middle">Swipe like/dislike → Profile vector</text>

  <rect x="540" y="118" width="225" height="55" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="652" y="142" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">📋 Preference QA 偏好问答</text>
  <text x="652" y="160" fill="#64748B" font-size="8" text-anchor="middle">Questionnaire → 8-dim aesthetic vector</text>

  <rect x="790" y="118" width="225" height="55" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="902" y="142" fill="#1E3A8A" font-size="11" font-weight="700" text-anchor="middle">🖼️ Reference Photo 参考图</text>
  <text x="902" y="160" fill="#64748B" font-size="8" text-anchor="middle">Manual style anchor selection</text>

  <!-- Subtle flow indicator between layers -->
  <polygon points="530,192 538,204 522,204" fill="#CBD5E1"/>

  <!-- ===== LAYER 2: JESR-CORE ===== -->
  <rect x="20" y="210" width="1020" height="130" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="210" width="1020" height="26" rx="8" fill="#EDE9FE"/>
  <rect x="20" y="222" width="1020" height="14" rx="0" fill="#EDE9FE"/>
  <text x="36" y="227" fill="#5B21B6" font-size="11" font-weight="700">JESR-CORE · 美学画像引擎 JESR-Aesthetic-Profile Engine</text>
  <text x="1024" y="227" fill="#C4B5FD" font-size="9" text-anchor="end">Layer 2 / 5</text>

  <rect x="40" y="250" width="310" height="75" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <text x="195" y="273" fill="#5B21B6" font-size="11.5" font-weight="700" text-anchor="middle">JESR-Aesthetic-Profile 美学画像</text>
  <text x="195" y="292" fill="#64748B" font-size="8" text-anchor="middle">8-dim: [light_tendency, warmth, contrast, texture_tendency,</text>
  <text x="195" y="306" fill="#64748B" font-size="8" text-anchor="middle">makeup_intensity, facial_detail, style_strength, identity_tolerance]</text>
  <text x="195" y="319" fill="#94A3B8" font-size="7.5" text-anchor="middle">All ∈ [-1, 1] · Source: seed_gallery | reference_photos | questionnaire | hybrid</text>

  <rect x="380" y="250" width="280" height="75" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="520" y="273" fill="#5B21B6" font-size="11" font-weight="700" text-anchor="middle">Recipe System 配方系统 (jesr_core.v1)</text>
  <text x="520" y="292" fill="#64748B" font-size="8" text-anchor="middle">Tone {brightness, warmth, contrast}</text>
  <text x="520" y="306" fill="#64748B" font-size="8" text-anchor="middle">Face {skin_smooth, face_slim, eye_size, lip_saturation, ...}</text>
  <text x="520" y="319" fill="#64748B" font-size="8" text-anchor="middle">Creative {preset_id, strength} · Feedback {pain_tags, free_text}</text>

  <rect x="690" y="250" width="325" height="75" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="852" y="273" fill="#5B21B6" font-size="11" font-weight="700" text-anchor="middle">5 Creative Style Presets 创意风格预设</text>
  <text x="852" y="293" fill="#64748B" font-size="8" text-anchor="middle">fresh_japanese 清新日系 · retro_hongkong 复古港风</text>
  <text x="852" y="307" fill="#64748B" font-size="8" text-anchor="middle">clear_korean 清透韩系 · lazy_french 法式慵懒</text>
  <text x="852" y="320" fill="#64748B" font-size="8" text-anchor="middle">american_hotgirl 美式辣妹</text>

  <!-- Subtle flow indicator -->
  <polygon points="530,346 538,358 522,358" fill="#CBD5E1"/>

  <!-- ===== LAYER 3: ORCHESTRATOR ===== -->
  <rect x="20" y="364" width="1020" height="108" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="364" width="1020" height="26" rx="8" fill="#DCFCE7"/>

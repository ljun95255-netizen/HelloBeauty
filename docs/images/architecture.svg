<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Arial, Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563EB"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16A34A"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C3AED"/>
    </marker>
    <marker id="arr-rose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E11D48"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D97706"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1100" height="820" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="550" y="32" fill="#0F172A" font-size="17" font-weight="700" text-anchor="middle">HelloBeauty — JESR Portrait Retouch Platform</text>
  <text x="550" y="52" fill="#94A3B8" font-size="10" text-anchor="middle">Joint Evaluation Scoring &amp; Rendering · Perception → Decision → Execution Pipeline</text>

  <!-- ===== Layer 1: Entry / Perception ===== -->
  <rect x="15" y="70" width="1070" height="115" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="70" width="1070" height="22" rx="8" fill="#DBEAFE"/>
  <text x="30" y="85" fill="#1E40AF" font-size="10" font-weight="700">ENTRY — User Intent Capture</text>

  <rect x="45" y="105" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="127" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">Phone Upload</text>
  <text x="130" y="143" fill="#64748B" font-size="7.5" text-anchor="middle">Camera / Album Photo</text>
  <text x="130" y="156" fill="#94A3B8" font-size="7" text-anchor="middle">JPEG/PNG → IngressService</text>

  <rect x="270" y="105" width="185" height="60" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="362" y="127" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">Seed Gallery</text>
  <text x="362" y="143" fill="#64748B" font-size="7.5" text-anchor="middle">Swipe-based Style Sampling</text>
  <text x="362" y="156" fill="#94A3B8" font-size="7" text-anchor="middle">Like/Dislike → Profile Vector</text>

  <rect x="510" y="105" width="185" height="60" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="602" y="127" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">Preference QA</text>
  <text x="602" y="143" fill="#64748B" font-size="7.5" text-anchor="middle">Questionnaire-based Profiling</text>
  <text x="602" y="156" fill="#94A3B8" font-size="7" text-anchor="middle">8-dim Aesthetic Vector</text>

  <rect x="750" y="105" width="190" height="60" rx="6" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="845" y="127" fill="#1E3A8A" font-size="10.5" font-weight="700" text-anchor="middle">Reference Photo</text>
  <text x="845" y="143" fill="#64748B" font-size="7.5" text-anchor="middle">Target-style Photo Anchor</text>
  <text x="845" y="156" fill="#94A3B8" font-size="7" text-anchor="middle">Manual Reference Selection</text>

  <!-- ===== Layer 2: JESR Core ===== -->
  <rect x="15" y="210" width="1070" height="135" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="210" width="1070" height="22" rx="8" fill="#EDE9FE"/>
  <text x="30" y="225" fill="#5B21B6" font-size="10" font-weight="700">JESR-CORE — JESR-Aesthetic-Profile Engine</text>

  <rect x="45" y="248" width="260" height="77" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <text x="175" y="271" fill="#5B21B6" font-size="11" font-weight="700" text-anchor="middle">JESR-Aesthetic-Profile</text>
  <text x="175" y="289" fill="#64748B" font-size="8" text-anchor="middle">Profile Vector (8 dims): [light_tendency, warmth,</text>
  <text x="175" y="303" fill="#64748B" font-size="8" text-anchor="middle">contrast, texture, makeup, facial_detail,</text>
  <text x="175" y="317" fill="#64748B" font-size="8" text-anchor="middle">style_strength, identity_tolerance]</text>

  <rect x="360" y="248" width="240" height="77" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="480" y="271" fill="#5B21B6" font-size="10.5" font-weight="700" text-anchor="middle">Recipe System (jesr_core.v1)</text>
  <text x="480" y="289" fill="#64748B" font-size="8" text-anchor="middle">Tone {brightness, warmth, contrast}</text>
  <text x="480" y="303" fill="#64748B" font-size="8" text-anchor="middle">Face {skin_smooth, eye_size, face_slim, ...}</text>
  <text x="480" y="317" fill="#64748B" font-size="8" text-anchor="middle">Creative {preset_id, strength}</text>

  <rect x="655" y="248" width="200" height="77" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="755" y="271" fill="#5B21B6" font-size="10.5" font-weight="700" text-anchor="middle">5 Style Presets</text>
  <text x="755" y="290" fill="#64748B" font-size="8" text-anchor="middle">fresh_japanese (清新日系)</text>
  <text x="755" y="303" fill="#64748B" font-size="8" text-anchor="middle">retro_hongkong · clear_korean</text>
  <text x="755" y="316" fill="#64748B" font-size="8" text-anchor="middle">lazy_french · american_hotgirl</text>

  <!-- Arrows from Entry to JESR-Core -->
  <polyline points="130,165 130,195 175,195 175,248" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <polyline points="362,165 362,195 480,195 480,248" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <polyline points="602,165 602,248" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <polyline points="845,165 845,195 755,195 755,248" fill="none" stroke="#2563EB" stroke-width="1.2" marker-end="url(#arr-blue)"/>

  <!-- ===== Layer 3: Orchestrator ===== -->
  <rect x="15" y="370" width="1070" height="115" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="370" width="1070" height="22" rx="8" fill="#DCFCE7"/>
  <text x="30" y="385" fill="#166534" font-size="10" font-weight="700">JESR-ORCHESTRATOR — Recipe Scheduling · Feedback · Rollback · Audit Trace</text>

  <rect x="45" y="406" width="220" height="60" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="155" y="428" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Recipe Compilation</text>
  <text x="155" y="445" fill="#64748B" font-size="8" text-anchor="middle">Profile → Recipe (apply_aesthetic_profile)</text>
  <text x="155" y="458" fill="#94A3B8" font-size="7.5" text-anchor="middle">8 linear mappings from vector to params</text>

  <rect x="310" y="406" width="195" height="60" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="407" y="428" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Feedback Interpreter</text>
  <text x="407" y="445" fill="#64748B" font-size="8" text-anchor="middle">Pain tags: identity · texture · style</text>
  <text x="407" y="458" fill="#94A3B8" font-size="7.5" text-anchor="middle">Free-text → tag mapping</text>

  <rect x="548" y="406" width="170" height="60" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="633" y="428" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Rollback</text>
  <text x="633" y="445" fill="#64748B" font-size="8" text-anchor="middle">Recipe version history</text>
  <text x="633" y="458" fill="#94A3B8" font-size="7.5" text-anchor="middle">Iteration-level undo</text>

  <rect x="760" y="406" width="185" height="60" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="852" y="428" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">Audit Trace</text>
  <text x="852" y="445" fill="#64748B" font-size="8" text-anchor="middle">Provider chain recording</text>
  <text x="852" y="458" fill="#94A3B8" font-size="7.5" text-anchor="middle">Model info + params hash</text>

  <!-- Arrows: JESR-Core → Orchestrator -->
  <polyline points="175,325 175,355 155,355 155,406" fill="none" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arr-violet)"/>
  <polyline points="480,325 480,355 407,355 407,406" fill="none" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arr-violet)"/>
  <polyline points="755,325 755,355 633,355 633,406" fill="none" stroke="#7C3AED" stroke-width="1.2" marker-end="url(#arr-violet)"/>

  <!-- ===== Layer 4: Rendering Pipeline (Fidelity + Creative) ===== -->
  <rect x="15" y="510" width="1070" height="135" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="510" width="1070" height="22" rx="8" fill="#FFEDD5"/>
  <text x="30" y="525" fill="#C2410C" font-size="10" font-weight="700">RENDERING — JESR-Fidelity + JESR-Creative (Diffusion img2img)</text>

  <rect x="45" y="548" width="250" height="78" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.8"/>
  <text x="170" y="570" fill="#9A3412" font-size="10.5" font-weight="700" text-anchor="middle">JESR-Fidelity</text>
  <text x="170" y="590" fill="#64748B" font-size="8" text-anchor="middle">smart_optimize (global auto-retouch)</text>
  <text x="170" y="605" fill="#64748B" font-size="8" text-anchor="middle">targeted_retouch (per-region params)</text>
  <text x="170" y="619" fill="#94A3B8" font-size="7.5" text-anchor="middle">GPEN BFR512 · Face Restoration</text>

  <rect x="355" y="548" width="250" height="78" rx="6" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.8"/>
  <text x="480" y="570" fill="#9A3412" font-size="10.5" font-weight="700" text-anchor="middle">JESR-Creative</text>
  <text x="480" y="590" fill="#64748B" font-size="8" text-anchor="middle">Diffusion img2img Style Transfer</text>
  <text x="480" y="605" fill="#64748B" font-size="8" text-anchor="middle">5 creative presets + strength control</text>
  <text x="480" y="619" fill="#94A3B8" font-size="7.5" text-anchor="middle">SSD-1B diffusers · Conditional Denoising</text>

  <rect x="670" y="548" width="260" height="78" rx="6" fill="#FFFFFF" stroke="#E11D48" stroke-width="2.2"/>
  <text x="800" y="570" fill="#BE123C" font-size="10.5" font-weight="700" text-anchor="middle">Metric Control Guard</text>
  <text x="800" y="590" fill="#64748B" font-size="8" text-anchor="middle">Identity Preservation: ArcFace SIM ≥ θ</text>
  <text x="800" y="605" fill="#64748B" font-size="8" text-anchor="middle">Strength retry: 4 descending steps</text>
  <text x="800" y="619" fill="#94A3B8" font-size="7.5" text-anchor="middle">Fallback → Fidelity output on identity fail</text>

  <!-- Arrows: Orchestrator → Rendering -->
  <polyline points="155,466 155,495 170,495 170,548" fill="none" stroke="#16A34A" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <polyline points="407,466 407,495 480,495 480,548" fill="none" stroke="#16A34A" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <polyline points="633,466 633,495 800,495 800,548" fill="none" stroke="#16A34A" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <!-- Internal arrows: Fidelity → Creative -->
  <polyline points="295,585 355,585" fill="none" stroke="#EA580C" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <text x="325" y="578" fill="#64748B" font-size="7" text-anchor="middle">img</text>

  <!-- Internal arrows: Creative → Metric Control -->
  <polyline points="605,585 670,585" fill="none" stroke="#EA580C" stroke-width="1.2" marker-end="url(#arr-amber)"/>

  <!-- Feedback loop: Metric Control → Orchestrator -->
  <polyline points="800,626 800,655 950,655 950,360 852,360 852,406" fill="none" stroke="#E11D48" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-rose)"/>
  <text x="955" y="510" fill="#E11D48" font-size="7.5" transform="rotate(-90, 955, 510)">feedback / retry</text>

  <!-- ===== Layer 5: Output ===== -->
  <rect x="15" y="670" width="1070" height="90" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="15" y="670" width="1070" height="22" rx="8" fill="#F1F5F9"/>
  <text x="30" y="685" fill="#475569" font-size="10" font-weight="700">OUTPUT — Rendered Result · Session Persistence · Model Distribution</text>

  <rect x="45" y="706" width="200" height="38" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="145" y="723" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Rendered Image</text>
  <text x="145" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">/api/assets/job/{job_id}</text>

  <rect x="310" y="706" width="200" height="38" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="410" y="723" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Session Store</text>
  <text x="410" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">In-memory + recipe history</text>

  <rect x="575" y="706" width="200" height="38" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="675" y="723" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Model Registry</text>
  <text x="675" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">Code in Git, Weights via Release</text>

  <rect x="840" y="706" width="200" height="38" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
  <text x="940" y="723" fill="#475569" font-size="9" font-weight="700" text-anchor="middle">Metric Logging</text>
  <text x="940" y="737" fill="#94A3B8" font-size="7.5" text-anchor="middle">IPS · SAS · SID · FHS · ODI · CEN</text>

  <!-- Arrows to output -->
  <polyline points="170,626 170,670 145,670 145,706" fill="none" stroke="#EA580C" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <polyline points="800,626 800,670 940,670 940,706" fill="none" stroke="#E11D48" stroke-width="1.2" marker-end="url(#arr-rose)"/>

  <!-- ===== Legend ===== -->
  <rect x="880" y="70" width="195" height="125" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="977" y="88" fill="#334155" font-size="10" font-weight="700" text-anchor="middle">Legend</text>
  <rect x="895" y="98" width="18" height="8" rx="2" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1"/><text x="920" y="106" fill="#475569" font-size="8">Entry / Perception</text>
  <rect x="895" y="112" width="18" height="8" rx="2" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1"/><text x="920" y="120" fill="#475569" font-size="8">JESR-Core / Domain</text>
  <rect x="895" y="126" width="18" height="8" rx="2" fill="#FFFFFF" stroke="#16A34A" stroke-width="1"/><text x="920" y="134" fill="#475569" font-size="8">Orchestrator</text>
  <rect x="895" y="140" width="18" height="8" rx="2" fill="#FFFFFF" stroke="#EA580C" stroke-width="1"/><text x="920" y="148" fill="#475569" font-size="8">Fidelity + Creative</text>
  <rect x="895" y="154" width="18" height="8" rx="2" fill="#FFFFFF" stroke="#E11D48" stroke-width="1"/><text x="920" y="162" fill="#475569" font-size="8">Metric Control Guard</text>
  <rect x="895" y="168" width="18" height="8" rx="2" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1"/><text x="920" y="176" fill="#475569" font-size="8">Output / Storage</text>
  <line x1="895" y1="186" x2="913" y2="186" stroke="#E11D48" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="920" y="189" fill="#475569" font-size="8">Feedback / Retry</text>
</svg>

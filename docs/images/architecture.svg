  <text x="1024" y="381" fill="#86EFAC" font-size="9" text-anchor="end">Layer 3 / 5</text>

  <rect x="40" y="404" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="150" y="427" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Recipe Compilation 配方编译</text>
  <text x="150" y="445" fill="#64748B" font-size="8" text-anchor="middle">Profile vector → 8 linear mapping → recipe params</text>

  <rect x="285" y="404" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="395" y="427" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Feedback Interpreter 反馈解释</text>
  <text x="395" y="445" fill="#64748B" font-size="8" text-anchor="middle">3 pain tags: identity · texture · style</text>

  <rect x="530" y="404" width="220" height="55" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="640" y="427" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Rollback 回滚</text>
  <text x="640" y="445" fill="#64748B" font-size="8" text-anchor="middle">Iteration-level versioned undo</text>

  <rect x="775" y="404" width="240" height="55" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="895" y="427" fill="#166534" font-size="10.5" font-weight="700" text-anchor="middle">Audit Trace 审计追踪</text>
  <text x="895" y="445" fill="#64748B" font-size="8" text-anchor="middle">Provider chain · Model info · Param snapshot</text>

  <!-- Subtle flow indicator -->
  <polygon points="530,478 538,490 522,490" fill="#CBD5E1"/>

  <!-- ===== LAYER 4: RENDERING ===== -->
  <rect x="20" y="496" width="1020" height="145" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="496" width="1020" height="26" rx="8" fill="#FFEDD5"/>
  <rect x="20" y="508" width="1020" height="14" rx="0" fill="#FFEDD5"/>
